<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dictionary (Plural Forming)</title>
  <style>
    :root{--black:#000;--text:#1a1a1a;--muted:#8a8a8a;--faint:#b5b5b5;--fainter:#d1d1d1;--sep:#f3f3f3;--border:#e3e3e3;--bg:#fff;--bg2:#fcfcfc;--bg3:#fafafa;--bg-hover:#fafafa;--bg-active:#f1f1f1;--bg-active-border:#dcdcdc;--active-bar:#111;--input-color:#000;--underline:#000;--word-underline:#000;--btn-bg:#fff;--btn-border:#e6e6e6;--btn-color:#666;--btn-active-bg:#eaeaea;--btn-active-color:#111;--btn-active-border:#111;--char-bg:#fff;--char-border:#efefef;--char-color:#111;--kbd-bg:#fff;--kbd-border:#e6e6e6;--kbd-color:#777;--pair-bg:#fcfcfc;--pair-border:var(--sep);--tag-border:#e7e7e7;--tag-de-bg:#f3f7ff;--tag-sr-bg:#fff6f3;--speak-bg:#fff;--speak-border:#e7e7e7;--speak-color:#444;--img-bg:#fff;--img-border:var(--sep);--empty-bg:#fafafa;--empty-border:#e8e8e8;--empty-color:#999;--chip-bg:#fff;--chip-border:#e8e8e8;--chip-color:#444;--chip-hover-bg:#f5f5f5;--header-border:#ebebeb;--lefthead-bg:#fff;--lefthead-line:rgba(0,0,0,0.06);--tooltip-bg:#222;--tooltip-color:#fff;--word-found-bg:rgba(0,0,0,.035);--word-found-hover:rgba(0,0,0,.08);--word-hover-bg:rgba(0,0,0,.04);--pl-bg:#fff;--pl-border:#eee;--quick-color:#111;--explain-color:#222;--shadow-active:0 1px 0 rgba(0,0,0,.03);}

    [data-theme="dark"]{--black:#fff;--text:#e0e0e0;--muted:#999;--faint:#777;--fainter:#555;--sep:#2a2a2a;--border:#3a3a3a;--bg:#151515;--bg2:#1a1a1a;--bg3:#1e1e1e;--bg-hover:#1e1e1e;--bg-active:#252525;--bg-active-border:#444;--active-bar:#ccc;--input-color:#e0e0e0;--underline:#e0e0e0;--word-underline:#e0e0e0;--btn-bg:#1e1e1e;--btn-border:#444;--btn-color:#aaa;--btn-active-bg:#333;--btn-active-color:#eee;--btn-active-border:#eee;--char-bg:#1e1e1e;--char-border:#3a3a3a;--char-color:#ccc;--kbd-bg:#222;--kbd-border:#444;--kbd-color:#999;--pair-bg:#1a1a1a;--pair-border:#2a2a2a;--tag-border:#3a3a3a;--tag-de-bg:#1a2233;--tag-sr-bg:#2a1a1a;--speak-bg:#1e1e1e;--speak-border:#3a3a3a;--speak-color:#ccc;--img-bg:#1a1a1a;--img-border:#2a2a2a;--empty-bg:#1a1a1a;--empty-border:#333;--empty-color:#777;--chip-bg:#1e1e1e;--chip-border:#3a3a3a;--chip-color:#ccc;--chip-hover-bg:#282828;--header-border:#2a2a2a;--lefthead-bg:#151515;--lefthead-line:rgba(255,255,255,0.06);--tooltip-bg:#e0e0e0;--tooltip-color:#111;--word-found-bg:rgba(255,255,255,.07);--word-found-hover:rgba(255,255,255,.14);--word-hover-bg:rgba(255,255,255,.06);--pl-bg:#1e1e1e;--pl-border:#3a3a3a;--quick-color:#e0e0e0;--explain-color:#ccc;--shadow-active:0 1px 0 rgba(255,255,255,.03);}
    *{box-sizing:border-box}
    @media (min-width: 921px) { html,body{overflow:hidden;height:100%} }
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;color:var(--text);background:var(--bg);}
    .wrap{max-width:1180px;margin:0 auto;padding:24px}

    header{display:flex;align-items:center;justify-content:flex-end;padding:6px 0 10px;border-bottom:2px solid var(--header-border)}
    .themeToggle{width:36px;height:36px;border:0;background:transparent;display:grid;place-items:center;cursor:pointer;font-size:20px;color:var(--text);border-radius:8px;transition:background .15s ease}
    .themeToggle:hover{background:var(--bg-hover)}

    .grid{display:grid;grid-template-columns:1fr 420px;gap:28px;padding-top:18px}

    .searchRow{display:flex;align-items:flex-end;gap:14px}
    .inputWrap{flex:1;min-width:220px;position:relative;padding-bottom:0;}
    input[type="text"]{width:100%;border:0;outline:none;font-size:22px;padding:0;background:transparent;color:var(--input-color)}
    input::placeholder{color:var(--faint)}
    .underline{position:relative;width:100%;height:3px;background:var(--underline);border-radius:2px;margin-top:6px}

    .dir{display:flex;align-items:center;gap:8px;padding-bottom:6px;user-select:none}
    .dir button{
      border:1px solid var(--btn-border);border-bottom-width:2px;
      background:var(--btn-bg);color:var(--btn-color);border-radius:999px;
      padding:6px 10px;font-size:12px;cursor:pointer;
      font-weight:600;
    }
    .dir button[data-active="true"]{color:var(--btn-active-color);border-color:var(--btn-active-border);background:var(--btn-active-bg);font-weight:800;transform:translateY(-1px)}
    .dir button:focus-visible{outline:2px solid #5a8cff;outline-offset:2px}

    /* Character helper (diacritics) */
    .charwrap{display:none;align-items:center;gap:4px;margin:6px 0 0 0}
    .charwrap.show{display:flex}
.charbar{display:flex;gap:3px;flex-wrap:wrap;align-items:center}
    .charbtn{
      border:1px solid var(--char-border);
      background:var(--char-bg);
      color:var(--char-color);
      border-radius:999px;
      padding:2px 7px;
      font-size:12px;
      line-height:1.2;
      cursor:pointer;
      user-select:none;
      transition:background .12s ease, border-color .12s ease, box-shadow .12s ease;
    }
    .charbtn:hover{background:var(--bg-hover);border-color:var(--btn-border)}
    .charbtn:active{transform:translateY(1px)}

    /* Results list focus ring: show only for keyboard navigation */
    #list:focus, #list:focus-visible{outline:none}


    .suggestList{margin:14px 0 0 0;padding:0;list-style:none;max-height:600px;overflow-y:auto;scrollbar-width:none;}
    .suggestList::-webkit-scrollbar{display:none;}
    .suggestItem{display:flex;align-items:baseline;justify-content:space-between;gap:16px;padding:12px 10px;border-top:2px solid var(--sep);cursor:pointer}
    .suggestItem:first-child{border-top:0}
    .suggestItem .hw{font-size:18px;color:var(--faint)}
    .suggestItem.hasMatch .hw{color:var(--text);font-weight:500}
    .suggestItem .tr{font-size:18px;color:var(--fainter);text-align:right;min-width:120px}

    .suggestItem .match{font-weight:700;color:inherit;background:none;padding:0;border-radius:0}
    .suggestItem .tr .match{font-weight:inherit;color:inherit;background:linear-gradient(transparent 65%, rgba(0,0,0,.18) 65%);padding:0 0.5px;border-radius:2px}
    /* Hover is subtle; Selected is clearly stronger */
    .suggestItem:not([data-active="true"]):hover{background:var(--bg-hover);border-radius:10px}
    .suggestItem[data-active="true"]{
      background:var(--bg-active);
      border-radius:10px;
      padding-left:12px;
      padding-right:10px;
      border:1px solid var(--bg-active-border);
      border-bottom-width:2px;
      box-shadow:var(--shadow-active);
      position:relative;
    }
    .suggestItem[data-active="true"]::before{
      content:"";
      position:absolute;
      left:0;
      top:8px;
      bottom:8px;
      width:3px;
      background:var(--active-bar);
      border-radius:3px;
      opacity:.25;
    }
    .suggestItem[data-active="true"] .hw{color:var(--muted)}
    .suggestItem[data-active="true"] .tr{color:var(--muted)}

    .detail{
      border:2px solid var(--border);
      border-radius:16px;
      padding:18px;
      height:calc(100vh - 120px);
      max-height:720px;
      overflow:auto;
      overflow-x:hidden;
      position:sticky;
      top:20px;
      background:var(--bg);
      scrollbar-width: none;
    }
    .detail::-webkit-scrollbar { display: none; }

    /* âœ… image block (above word) */
    .imgWrap{
      width:100%;
      height:210px;
      border:1px solid var(--img-border);
      border-bottom-width:2px;
      border-radius:14px;
      background:var(--img-bg);
      overflow:hidden;
      margin:2px 0 12px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
        /* Placeholder inside image area (when entry has no image yet or image fails) */
    .imgWrap{
      position: relative;
    }
    .imgWrap .imgPlaceholder{
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #c0c0c0;
      font-size: 14px;
      letter-spacing: .2px;
      user-select: none;
      transition: opacity .15s ease;
    }
    .imgWrap .imgPlaceholder svg{
      width: 26px;
      height: 26px;
      opacity: .65;
    }
    .imgWrap.loaded .imgPlaceholder{
      opacity: 0;
      pointer-events: none;
    }
    .imgWrap .entryImg{
      position: relative;
      z-index: 1;
    }
@media (max-width: 900px){
      .imgWrap{ height:140px; }
    }
    .entryImg{
      display:block;
      width:100%;
      height:100%;
      object-fit:contain;
      background:var(--img-bg);
    }

    .wordRow{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:6px;
    }

    .wordLine{
      display:flex;
      align-items:flex-end;
      gap:10px;
      width:100%;
      max-width:100%;
    }

    .word{
      font-size:40px;
      font-weight:800;
      margin:4px 0 6px;
      color:var(--black);
      letter-spacing:.2px;
      max-width:100%;
      white-space:nowrap;
      line-height:1.05;
    }

    .word.der{color:#1f6feb;}
    .word.die{color:#d1242f;}
    .word.das{color:#2da44e;}

    .plTag{
      font-size:14px;
      color:var(--muted);
      border:1px solid var(--pl-border);
      border-bottom-width:2px;
      background:var(--pl-bg);
      border-radius:999px;
      padding:4px 10px;
      font-weight:700;
      margin-top:2px;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    .plEmpty{visibility:hidden}

    .plHi{color:#7c3aed;font-weight:800;}
    .plBase{color:#d1242f;font-weight:800;}
    .senseAccordion{margin:5px 0;border-radius:10px;overflow:hidden;border:1px solid var(--border);border-bottom-width:2px;}
    .senseToggle{display:flex;align-items:center;gap:10px;width:100%;background:var(--bg2);border:none;padding:9px 12px;cursor:pointer;text-align:left;font-size:15px;font-weight:600;color:var(--text);transition:background .12s ease;}
    .senseToggle:hover{background:var(--bg-hover);}
    .senseIcon{width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;border-radius:999px;background:#2da44e;color:#ffe34e;font-size:16px;font-weight:900;font-style:normal;flex-shrink:0;line-height:1;}
    .senseLabel{flex:1;}
    .senseBody{display:none;padding:4px 10px 10px;background:var(--bg);}
    .senseAccordion.open .senseBody{display:block;}

    .meta{color:var(--faint);font-size:14px;margin-bottom:10px;line-height:1.35}
    .wordUnderline{height:4px;width:160px;background:var(--word-underline);border-radius:2px;margin:10px 0 12px}

    .quick{font-size:18px;font-weight:650;color:var(--quick-color);margin:0 0 14px;line-height:1.35;}

    .explain{font-size:18px;line-height:1.6;color:var(--text)}
    .explain .sense{margin:14px 0 16px}
    .explain .head{font-size:18px;font-weight:800;margin:0 0 8px 0}
    .explain .plain{margin:8px 0 10px;color:var(--explain-color)}
    .explain .pair{
      margin:8px 0;
      padding:10px 12px;
      border:1px solid var(--pair-border);
      border-bottom-width:2px;
      border-radius:12px;
      background:var(--pair-bg);
      display:flex;
      align-items:flex-start;
      gap:10px;
    }

    .explain .langTag{
      display:inline-flex;
      align-items:center;
      gap:6px;
      min-width:auto;
      font-weight:800;
      font-size:12px;
      letter-spacing:.3px;
      padding:3px 10px;
      border-radius:999px;
      border:1px solid var(--tag-border);
      border-bottom-width:2px;
      margin-right:0;
      vertical-align:top;
      line-height:1;
      white-space:nowrap;
      flex:0 0 auto;
    }
    .explain .langTag .flag{font-size:14px; line-height:1;}
    .explain .langTag .code{font-size:11px; opacity:.75; letter-spacing:.6px;}

    .explain .langTag.de{background:var(--tag-de-bg)}
    .explain .langTag.sr{background:var(--tag-sr-bg)}
    .explain .langTxt{display:inline; color:var(--explain-color)}

    .pairMain{
      display:flex;
      align-items:flex-start;
      gap:10px;
      flex:1 1 auto;
      min-width:0;
    }

    .art{font-weight:700}
    .art.der{color:#1f6feb;}
    .art.die{color:#d1242f;}
    .art.das{color:#2da44e;}
    .meta .art{font-weight:700}

    .keys{margin-top:10px;color:var(--fainter);font-size:12px;user-select:none}
    kbd{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;font-size:12px;border:1px solid var(--kbd-border);border-bottom-width:2px;border-radius:6px;padding:2px 6px;background:var(--kbd-bg);color:var(--kbd-color)}

    .err{margin-top:10px;color:#b00020;font-size:12px;display:none}
    .loading{margin-top:10px;color:#c9c9c9;font-size:12px;display:none}
    .loadingMore{text-align:center;padding:12px;color:#999;font-size:13px;display:none}
    .emptyState{
      margin-top:24px;
      padding:32px 20px;
      text-align:center;
      color:var(--empty-color);
      font-size:15px;
      line-height:1.6;
      border:2px dashed var(--empty-border);
      border-radius:12px;
      background:var(--empty-bg);
    }
    .emptyState strong{color:var(--muted)}

    .speakBtn{
      border:1px solid var(--speak-border);
      border-bottom-width:2px;
      background:var(--speak-bg);
      border-radius:999px;
      padding:4px 8px;
      font-size:14px;
      line-height:1;
      cursor:pointer;
      user-select:none;
      color:var(--speak-color);
      flex:0 0 auto;
    }
    .speakBtn:hover{background:var(--bg-hover)}
    .speakBtn:active{transform:translateY(1px)}
    .speakBtn[disabled]{opacity:.45; cursor:not-allowed}
    .pair .speakBtn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;padding:0;border-radius:999px;background:#2da44e;border:1.5px solid #1a7f37;border-bottom-width:2px;color:#fff;margin-left:auto;}
    .pair .speakBtn:hover{background:#1a7f37;}
    .speakBtn.speakBtnGreen{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;padding:0;border-radius:999px;background:#2da44e;border:1.5px solid #1a7f37;border-bottom-width:2px;color:#fff;}
    .speakBtn.speakBtnGreen:hover{background:#1a7f37;}
    .speakBtn.speakBtnWord{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;background:#2da44e;border:1.5px solid #1a7f37;border-bottom-width:3px;border-radius:999px;color:#fff;padding:0;}
    .speakBtn.speakBtnWord:hover{background:#1a7f37;border-color:#116329;}
    .speakBtn.speakBtnWord svg{width:18px;height:18px;flex-shrink:0;}

    @media (max-width:920px){
      .grid{grid-template-columns:1fr}
      .detail{position:relative;top:auto;height:auto;max-height:none}
    }
  
/* --- v12 tweak: make hover much lighter than selected --- */
.result-item{
  transition: background 0.08s ease, border-color 0.08s ease, box-shadow 0.08s ease;
}

/* Hover is subtle and never overrides a selected row */
.result-item:not(.selected):hover{
  background:var(--bg-hover);
}

/* Selected is clearly stronger than hover */
.result-item.selected{
  background:var(--bg-active);
  border-color:var(--bg-active-border);
  position:relative;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
}
.result-item.selected:hover{
  background:var(--bg-active);
}

/* Keep the left indicator, but slightly calmer */
.result-item.selected::before{
  content:'';
  position:absolute;
  left:0;
  top:8px;
  bottom:8px;
  width:3px;
  background:var(--active-bar);
  border-radius:2px;
  opacity:0.45;
}


/* Sticky left header (search + helper letters) */
.leftHeader{
  position: sticky;
  top: 0;
  z-index: 20;
  background: var(--lefthead-bg);
  padding-top: 6px;
  padding-bottom: 8px;
}
.leftHeader::after{
  content:"";
  display:block;
  height:1px;
  background: var(--lefthead-line);
  margin-top: 10px;
}

/* Make sure helper chips don't wrap awkwardly on small widths */
.charWrap{
  flex-wrap: wrap;
  row-gap: 4px;
}

/* LEFT PANEL: enable scroll like the right detail panel */
.grid > section{
  height: calc(100vh - 120px);
  max-height: 720px;
  overflow: auto;
  overflow-x: hidden;
  scrollbar-width: none;
}
.grid > section::-webkit-scrollbar { display: none; }

/* On small screens keep normal flow (like your existing @media rule for .detail) */
@media (max-width:920px){
  .grid > section{
    height: auto;
    max-height: none;
    overflow: visible;
  }
  .suggestList{
    max-height:40vh;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }
  .keys{
    display:none;
  }
  .detail{
    border-radius:12px;
    padding:14px;
  }
}

/* Clickable words in examples */
.dict-word{
  cursor:pointer;
  border-bottom:1.5px dotted transparent;
  border-radius:1px;
  transition: border-color .15s ease, color .15s ease, background .15s ease;
}
.dict-word:hover{
  border-bottom-color:var(--muted);
  background:var(--word-hover-bg);
  border-radius:3px;
}
.dict-word.loading{
  opacity:.5;
  pointer-events:none;
}
.dict-word.not-found{
  cursor:default;
  border-bottom-color:transparent;
}
.dict-word.found{
  background:var(--word-found-bg);
  border-radius:3px;
  padding:0 2px;
  border-bottom-color:transparent;
}
.dict-word.found:hover{
  background:var(--word-found-hover);
  border-bottom-color:transparent;
}

/* Tooltip for word preview */
.dict-tooltip{
  position:absolute;
  z-index:100;
  background:var(--tooltip-bg);
  color:var(--tooltip-color);
  font-size:13px;
  font-weight:500;
  line-height:1.35;
  padding:6px 10px;
  border-radius:8px;
  max-width:240px;
  white-space:normal;
  pointer-events:none;
  opacity:0;
  transform:translateY(4px);
  transition:opacity .15s ease, transform .15s ease;
  box-shadow:0 2px 8px rgba(0,0,0,.18);
}
.dict-tooltip.visible{
  opacity:1;
  transform:translateY(0);
}
.dict-tooltip::after{
  content:"";
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:-5px;
  border-left:6px solid transparent;
  border-right:6px solid transparent;
  border-top:5px solid var(--tooltip-bg);
}

/* Search history */
.history{
  display:none;
  margin:14px 0 0 0;
  padding:0;
}
.history.show{
  display:block;
}
.historyTitle{
  font-size:12px;
  color:#aaa;
  letter-spacing:.3px;
  margin:0 0 8px 2px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.historyClear{
  border:none;
  background:none;
  color:#ccc;
  font-size:11px;
  cursor:pointer;
  padding:2px 4px;
}
.historyClear:hover{
  color:#888;
}
.historyChips{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.historyChip{
  display:inline-flex;
  align-items:center;
  gap:4px;
  border:1px solid var(--chip-border);
  border-bottom-width:2px;
  background:var(--chip-bg);
  border-radius:999px;
  padding:4px 10px;
  font-size:13px;
  color:var(--chip-color);
  cursor:pointer;
  user-select:none;
  transition:background .12s ease, border-color .12s ease;
}
.historyChip:hover{
  background:var(--chip-hover-bg);
  border-color:var(--border);
}
.historyChip .chipDir{
  font-size:10px;
  color:#aaa;
  font-weight:600;
}
.historyChip .chipX{
  font-size:11px;
  color:#ccc;
  margin-left:2px;
  line-height:1;
}
.historyChip .chipX:hover{
  color:#888;
}

</style>
</head>
<body>
  <div class="wrap">
    <header>
      <button class="themeToggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">âک€ï¸ڈ</button>
    </header>

    <div class="grid">
      <section>
        <div class="leftHeader">
<div class="searchRow">
          <div class="inputWrap">
            <input id="q" type="text" autocomplete="off" spellcheck="false" placeholder="ًں”چ Pretraإ¾i..." />
            <div class="underline"></div>
            <div id="charwrap" class="charwrap" aria-label="Character helper">
              <div id="charbar" class="charbar" aria-label="Character buttons"></div>
            </div>
          </div>

          <div class="dir" aria-label="Direction">
            <button id="btnSRDE" data-active="true" title="Serbian â†’ German">SRâ†’DE</button>
            <button id="btnDESR" data-active="false" title="German â†’ Serbian">DEâ†’SR</button>
          </div>
        </div>

        <ul id="list" class="suggestList" tabindex="0" role="listbox" aria-label="Results"></ul>
        <div id="historyBox" class="history"></div>
        <div class="emptyState" id="emptyState" style="display:none"></div>
        <div class="loadingMore" id="loadingMore">âڈ³ Uؤچitavam...</div>
        <div class="loading" id="loading">Loadingâ€¦</div>
        <div class="err" id="err"></div>
        <div class="keys"><kbd>â†‘</kbd> <kbd>â†“</kbd> <kbd>Enter</kbd> <kbd>Esc</kbd></div>
      </section>

      <aside class="detail" id="detail"></aside>
    </div>
  </div>

<script>
  const q = document.getElementById("q");
  const list = document.getElementById("list");
  const detail = document.getElementById("detail");
  const btnSRDE = document.getElementById("btnSRDE");
  const btnDESR = document.getElementById("btnDESR");
  const errBox = document.getElementById("err");
  const loading = document.getElementById("loading");
  const loadingMore = document.getElementById("loadingMore");
  const emptyState = document.getElementById("emptyState");
  const historyBox = document.getElementById("historyBox");

  // -------------------------
  // Search history (localStorage)
  // -------------------------
  const HISTORY_KEY = "dict_search_history";
  const HISTORY_MAX = 15;

  function loadHistory(){
    try{
      const raw = localStorage.getItem(HISTORY_KEY);
      if(!raw) return [];
      const arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    }catch(e){ return []; }
  }

  function saveHistory(arr){
    try{ localStorage.setItem(HISTORY_KEY, JSON.stringify(arr)); }catch(e){}
  }

  function addToHistory(word, direction){
    if(!word || word.trim().length < 4) return;
    let hist = loadHistory();
    hist = hist.filter(h => !(h.word.toLowerCase() === word.toLowerCase() && h.dir === direction));
    hist.unshift({ word, dir: direction });
    if(hist.length > HISTORY_MAX) hist = hist.slice(0, HISTORY_MAX);
    saveHistory(hist);
  }

  function removeFromHistory(index){
    let hist = loadHistory();
    hist.splice(index, 1);
    saveHistory(hist);
    renderHistory();
  }

  function clearHistory(){
    saveHistory([]);
    renderHistory();
  }

  function renderHistory(){
    const term = q.value.trim();
    const hist = loadHistory();

    if(term || hist.length === 0){
      historyBox.classList.remove("show");
      return;
    }

    historyBox.classList.add("show");
    historyBox.innerHTML = `
      <div class="historyTitle">
        <span>Nedavno traإ¾eno</span>
        <button class="historyClear" title="Obriإ،i istoriju">obriإ،i sve</button>
      </div>
      <div class="historyChips">
        ${hist.map((h, i) => `
          <span class="historyChip" data-idx="${i}" data-word="${escapeHtml(h.word)}" data-dir="${escapeHtml(h.dir)}">
            <span class="chipDir">${h.dir === "SR_DE" ? "SRâ†’DE" : "DEâ†’SR"}</span>
            ${escapeHtml(h.word)}
            <span class="chipX" data-remove="${i}" title="Ukloni">âœ•</span>
          </span>
        `).join("")}
      </div>
    `;

    historyBox.querySelector(".historyClear")?.addEventListener("click", (e)=>{
      e.preventDefault();
      clearHistory();
    });

    historyBox.querySelectorAll(".historyChip").forEach(chip =>{
      chip.addEventListener("click", (e)=>{
        if(e.target.closest(".chipX")) return;
        const word = chip.dataset.word;
        const chipDir = chip.dataset.dir;

        if(chipDir && chipDir !== dir){
          dir = chipDir;
          btnSRDE.dataset.active = (dir==="SR_DE") ? "true" : "false";
          btnDESR.dataset.active = (dir==="DE_SR") ? "true" : "false";
          btnSRDE.setAttribute("aria-pressed", dir==="SR_DE" ? "true" : "false");
          btnDESR.setAttribute("aria-pressed", dir==="DE_SR" ? "true" : "false");
          updateCharBar();
          updatePlaceholder();
        }

        q.value = word;
        q.focus();
        search();
      });
    });

    historyBox.querySelectorAll(".chipX").forEach(x =>{
      x.addEventListener("click", (e)=>{
        e.stopPropagation();
        const idx = parseInt(x.dataset.remove, 10);
        if(!isNaN(idx)) removeFromHistory(idx);
      });
    });
  }

  // Pagination for suggestions
  const PAGE_SIZE = 20;
  let offset = 0;
  let hasMore = false;

  const charwrap = document.getElementById("charwrap");
const charbar = document.getElementById("charbar");

  // Character sets shown above the search input depending on direction
  const CHARSETS = {
    "SR_DE": ["ؤچ","ؤ‡","ؤ‘","إ،","إ¾"],
    "DE_SR": ["أ¤","أ¶","أ¼","أں","أ„","أ–","أœ"]
  };

  function updateCharBar(){
    if(!charwrap || !charbar) return;
    const chars = CHARSETS[dir] || [];
    if(!chars.length){
      charwrap.classList.remove("show");
      charbar.innerHTML = "";
      return;
    }
    charwrap.classList.add("show");
charbar.innerHTML = chars.map(ch => `<button type="button" class="charbtn" data-ch="${escapeHtml(ch)}">${escapeHtml(ch)}</button>`).join("");
  }


  function updatePlaceholder(){
    if(!q) return;
    q.placeholder = "ًں”چ Pretraإ¾i...";
  }

  function insertAtCursor(input, text){
    if(!input) return;
    const start = input.selectionStart ?? input.value.length;
    const end = input.selectionEnd ?? input.value.length;

    // Prefer setRangeText when available (keeps undo stack nicely)
    if(typeof input.setRangeText === "function"){
      input.setRangeText(text, start, end, "end");
    } else {
      const v = input.value;
      input.value = v.slice(0, start) + text + v.slice(end);
      const pos = start + text.length;
      try { input.setSelectionRange(pos, pos); } catch {}
    }

    input.focus({preventScroll:true});
    // Trigger your existing input listener (so search updates)
    input.dispatchEvent(new Event("input", {bubbles:true}));
  }

  if(charbar){
    // Keep focus in the search input when clicking diacritics
    charbar.addEventListener("mousedown", (e) => {
      const btn = e.target.closest(".charbtn");
      if(!btn) return;
      e.preventDefault();
      insertAtCursor(q, btn.dataset.ch || btn.textContent || "");
    });
  }


  let dir = "SR_DE";
  let results = [];
  let active = 0;
  let selectedId = null;

  // Permalink support: keep direction/query/selected id in the URL
  const __urlParams = new URLSearchParams(window.location.search);
  const __initDir = (__urlParams.get("dir") || "").toUpperCase();
  const __initQ = __urlParams.get("q") || "";
  let __pendingSelectId = __urlParams.get("id"); // string
  let __isInit = true;

  function syncUrl(){
    const p = new URLSearchParams();
    p.set("dir", dir);
    p.set("q", q.value.trim());
    if (selectedId != null && String(selectedId).trim() !== "") p.set("id", String(selectedId));
    const newUrl = `${window.location.pathname}?${p.toString()}`;
    window.history.replaceState(null, "", newUrl);
  }

  // Make the results list keyboard-focusable so ArrowUp/ArrowDown work after refocusing
  if (list) {
    list.tabIndex = 0;

    // When user clicks inside the list, move focus to the list (so keyboard navigation continues)
    list.addEventListener("mousedown", () => {
      list.focus({ preventScroll: true });
    });

    // Enable keyboard navigation when the list itself has focus
    list.addEventListener("keydown", (e) => {
      if (e.key === "ArrowDown") {
        e.preventDefault();
        if (results.length) { active = Math.min(active + 1, results.length - 1); renderList(); }
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        if (results.length) { active = Math.max(active - 1, 0); renderList(); }
      } else if (e.key === "Enter") {
        e.preventDefault();
        if (results.length) renderDetail(results[active]);
      } else if (e.key === "Escape") {
        e.preventDefault();
        q.value = "";
        q.focus();
        search();
      }
    });
  }

  function setDir(next){
    dir = next;
        updatePlaceholder();
    updateCharBar();
// direction changed â†’ reflect in URL
    syncUrl();
    btnSRDE.dataset.active = (dir==="SR_DE") ? "true" : "false";
    btnDESR.dataset.active = (dir==="DE_SR") ? "true" : "false";
    btnSRDE.setAttribute("aria-pressed", dir==="SR_DE" ? "true" : "false");
    btnDESR.setAttribute("aria-pressed", dir==="DE_SR" ? "true" : "false");
    search();
    q.focus();
  }

  btnSRDE.addEventListener("click", ()=> setDir("SR_DE"));
  btnDESR.addEventListener("click", ()=> setDir("DE_SR"));

  // Infinite scroll: load more when scrolling near bottom
  let isLoadingMore = false;
  
  list.addEventListener("scroll", async ()=>{
    if(isLoadingMore || !hasMore) return;
    
    const scrollTop = list.scrollTop;
    const scrollHeight = list.scrollHeight;
    const clientHeight = list.clientHeight;
    
    // Trigger when 100px from bottom
    if(scrollTop + clientHeight >= scrollHeight - 100){
      const term = q.value.trim();
      if(!term && term !== "") return;
      
      const prevActive = active;
      
      try{
        isLoadingMore = true;
        loadingMore.style.display = "block"; // Show loading indicator
        offset += PAGE_SIZE;
        
        const params = new URLSearchParams({
          direction: dir,
          q: term,
          limit: String(PAGE_SIZE),
          offset: String(offset)
        });
        
        const data = await fetchJson(`/api/dict/search?${params.toString()}`);
        const next = Array.isArray(data) ? data : (data?.rows || []);
        
        if(next && next.length){
          results = results.concat(next);
        }
        
        hasMore = Array.isArray(next) && next.length === PAGE_SIZE;
        active = Math.min(prevActive, Math.max(results.length - 1, 0));
        renderList();
      }catch(e){
        console.error(e);
      }finally{
        isLoadingMore = false;
        loadingMore.style.display = "none"; // Hide loading indicator
      }
    }
  });

  function escapeHtml(s){
    return (s ?? "").toString()
      .replaceAll("&","&amp;").replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function stripLeadingArticle(s){
    // Removes a leading German definite article (der/die/das) if present.
    return (s ?? "").toString().trim().replace(/^(der|die|das)\s+/i, "").trim();
  }


  function escapeRegExp(s){
    return (s ?? "").toString().replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  }

  function highlightHtml(text, needle){
    const src = (text ?? "").toString();
    const qv = (needle ?? "").toString().trim();
    if(!qv) return escapeHtml(src);
    const re = new RegExp(escapeRegExp(qv), "ig");
    let out = "";
    let last = 0;
    let m;
    while((m = re.exec(src)) !== null){
      const start = m.index;
      const end = start + m[0].length;
      out += escapeHtml(src.slice(last, start));
      out += `<span class="match">${escapeHtml(src.slice(start, end))}</span>`;
      last = end;
      // prevent zero-length infinite loops
      if(re.lastIndex === m.index) re.lastIndex++;
    }
    out += escapeHtml(src.slice(last));
    return out;
  }

  function normalizeCmp(s){
    return (s ?? "").toString()
      .replace(/\s+/g," ")
      .trim()
      .toLowerCase()
      .replace(/[.,;:!?\-â€“â€”]+$/,"");
  }

  function normalizeGloss(s){
    const t = (s ?? "").toString().trim();
    return t.replace(/^\((der|die|das)\)\s+/i, (_, art) => art.toLowerCase() + " ");
  }

  function getQuickGloss(item){
    const mg = normalizeGloss(item?.main_gloss ?? "").trim();
    if(!mg) return "";
    const first = mg.split(/[;,]/)[0].trim();
    return first || mg;
  }

  function getExplanationText(item){
    const rc = (item?.raw_clean ?? "").toString().trim();
    if(rc) return rc;
    const mg = (item?.main_gloss ?? "").toString().trim();
    if(mg) return mg;
    return "";
  }

  // âœ… image renderer (shows only if image_url exists)
  function renderImageHtml(item){
    const url = item && item.image_url ? item.image_url : '';
    const placeholder = `
      <div class="imgPlaceholder" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3.5" y="5" width="17" height="14" rx="2"></rect>
          <path d="M7.5 14l2.8-3.2a1 1 0 0 1 1.5 0l2.2 2.5a1 1 0 0 0 1.5 0l1.9-2.1"></path>
          <path d="M9 9.5h.01"></path>
        </svg>
        <span>Nema slike</span>
      </div>`;

    if(!url){
      return `<div class="imgWrap">${placeholder}</div>`;
    }

    // We add the placeholder always; on load we hide it, on error we remove the image and keep the placeholder.
    const safeUrl = String(url).replaceAll('"','&quot;');
    return `
      <div class="imgWrap">
        ${placeholder}
        <img
          class="entryImg"
          src="${safeUrl}"
          alt=""
          loading="lazy"
          decoding="async"
        />
      </div>
    `;
  }

  function isDashOnlyLine(s){
    const t = (s ?? "").toString().trim();
    return t === "-" || t === "â€“" || t === "â€”";
  }

  function normalizeRawLines(text){
    const lines = (text ?? "").toString().replace(/\r\n/g, "\n").split("\n");
    const out = [];

    for(let line of lines){
      if(line == null) continue;
      let s = String(line).replace(/\s+$/,"");
      if(s.trim()==="") continue;
      if(isDashOnlyLine(s)) continue;

      s = s.replace(/^\s*[-â€“â€”]\s*(DE|SR)\s*:\s*/i, (_, tag) => tag.toUpperCase() + ": ");
      s = s.replace(/^\s*[-â€“â€”]\s+/,"");
      s = s.replace(/^\s*\d+\.\s+/, "");

      if(s.trim()==="") continue;

      {
        const m = s.match(/^(.*?)(?:\s*\/\s*SR\s*:\s*)(.+)$/i);
        if (m) {
          const left = (m[1] || "").trim();
          const right = (m[2] || "").trim();
          if (left) out.push(`DE: ${left}`);
          if (right) out.push(`SR: ${right}`);
          continue;
        }
      }

      out.push(s);
    }

    return out;
  }

  function dropLeadingQuickDuplicate(lines, quick){
    const qn = normalizeCmp(quick);
    if(!qn) return lines;

    const out = [...lines];
    for(let i=0;i<out.length;i++){
      if(out[i].trim()==="") continue;
      if(normalizeCmp(out[i]) === qn){
        out.splice(i,1);
      }
      break;
    }
    return out;
  }

  // -------------------------
  // Clickable words in examples
  // -------------------------
  const lookupCache = new Map();

  function wordLookupDir(lang){
    if(lang === "de") return "DE_SR";
    if(lang === "sr") return "SR_DE";
    return dir;
  }

  function wrapWordsClickable(text, lang){
    const escaped = escapeHtml(text);
    return escaped.replace(/([a-zA-Zأ¤أ¶أ¼أ„أ–أœأںؤچؤ‡ؤ‘إ،إ¾ؤŒؤ†ؤگإ إ½a-zA-Z\u00C0-\u024F]+)/g, (match) => {
      if(match.length < 4) return match;
      const lookupDir = wordLookupDir(lang);
      return `<span class="dict-word" data-word="${match}" data-lookup-dir="${lookupDir}">${match}</span>`;
    });
  }

  async function lookupWord(word, lookupDir){
    const cacheKey = `${lookupDir}|${word.toLowerCase()}`;
    if(lookupCache.has(cacheKey)) return lookupCache.get(cacheKey);

    try{
      const params = new URLSearchParams({ word, direction: lookupDir });
      const data = await fetchJson(`/api/dict/lookup?${params.toString()}`);
      lookupCache.set(cacheKey, data);
      return data;
    }catch(e){
      console.error("Lookup error:", e);
      return { found: false };
    }
  }

  async function handleWordClick(e){
    const span = e.target.closest(".dict-word");
    if(!span || span.classList.contains("not-found") || span.classList.contains("loading")) return;

    const word = span.dataset.word;
    const lookupDir = span.dataset.lookupDir;
    if(!word || !lookupDir) return;

    span.classList.add("loading");

    const result = await lookupWord(word, lookupDir);

    span.classList.remove("loading");

    if(!result.found){
      span.classList.add("not-found");
      return;
    }

    // Push current state to history so Back button works
    const currentParams = new URLSearchParams();
    currentParams.set("dir", dir);
    currentParams.set("q", q.value.trim());
    if(selectedId != null) currentParams.set("id", String(selectedId));
    window.history.pushState(null, "", `${window.location.pathname}?${currentParams.toString()}`);

    if(lookupDir !== dir){
      dir = lookupDir;
      btnSRDE.dataset.active = (dir==="SR_DE") ? "true" : "false";
      btnDESR.dataset.active = (dir==="DE_SR") ? "true" : "false";
      btnSRDE.setAttribute("aria-pressed", dir==="SR_DE" ? "true" : "false");
      btnDESR.setAttribute("aria-pressed", dir==="DE_SR" ? "true" : "false");
      updateCharBar();
      updatePlaceholder();
    }

    q.value = result.headword;
    __pendingSelectId = String(result.id);
    addToHistory(result.headword, lookupDir);
    await search();
  }

  // -------------------------
  // Tooltip on hover
  // -------------------------
  let tooltipEl = null;
  let tooltipTimer = null;
  let tooltipCurrentSpan = null;

  function ensureTooltip(){
    if(!tooltipEl){
      tooltipEl = document.createElement("div");
      tooltipEl.className = "dict-tooltip";
      document.body.appendChild(tooltipEl);
    }
    return tooltipEl;
  }

  function hideTooltip(){
    clearTimeout(tooltipTimer);
    tooltipTimer = null;
    tooltipCurrentSpan = null;
    if(tooltipEl){
      tooltipEl.classList.remove("visible");
    }
  }

  function positionTooltip(span){
    const tip = ensureTooltip();
    const rect = span.getBoundingClientRect();
    const tipRect = tip.getBoundingClientRect();

    let left = rect.left + rect.width / 2 - tipRect.width / 2;
    let top = rect.top - tipRect.height - 8;

    if(left < 6) left = 6;
    if(left + tipRect.width > window.innerWidth - 6) left = window.innerWidth - tipRect.width - 6;
    if(top < 6){
      top = rect.bottom + 8;
    }

    tip.style.left = left + window.scrollX + "px";
    tip.style.top = top + window.scrollY + "px";
  }

  function showTooltipFor(span){
    const word = span.dataset.word;
    const lookupDir = span.dataset.lookupDir;
    if(!word || !lookupDir) return;

    tooltipCurrentSpan = span;

    tooltipTimer = setTimeout(async ()=>{
      if(tooltipCurrentSpan !== span) return;

      const result = await lookupWord(word, lookupDir);

      if(tooltipCurrentSpan !== span) return;
      if(!result.found){
        span.classList.add("not-found");
        return;
      }

      const tip = ensureTooltip();
      tip.textContent = result.main_gloss || result.headword;
      tip.classList.remove("visible");

      requestAnimationFrame(()=>{
        if(tooltipCurrentSpan !== span) return;
        positionTooltip(span);
        tip.classList.add("visible");
      });
    }, 300);
  }

  detail.addEventListener("mouseenter", (e)=>{
    const span = e.target.closest(".dict-word");
    if(!span || span.classList.contains("not-found")) return;
    showTooltipFor(span);
  }, true);

  detail.addEventListener("mouseleave", (e)=>{
    const span = e.target.closest(".dict-word");
    if(!span) return;
    hideTooltip();
  }, true);

  detail.addEventListener("scroll", hideTooltip);

  // -------------------------
  // Batch prefetch clickable words
  // -------------------------
  async function prefetchClickableWords(){
    const spans = detail.querySelectorAll(".dict-word:not(.found):not(.not-found)");
    if(!spans.length) return;

    const byDir = {};
    for(const span of spans){
      const lookupDir = span.dataset.lookupDir;
      const word = span.dataset.word;
      if(!lookupDir || !word) continue;
      if(!byDir[lookupDir]) byDir[lookupDir] = new Set();
      byDir[lookupDir].add(word);
    }

    for(const [lookupDir, wordSet] of Object.entries(byDir)){
      const uncached = [...wordSet].filter(w => !lookupCache.has(`${lookupDir}|${w.toLowerCase()}`));

      if(uncached.length > 0){
        try{
          const resp = await fetch("/api/dict/lookup-batch", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Accept": "application/json" },
            body: JSON.stringify({ words: uncached, direction: lookupDir })
          });
          if(resp.ok){
            const data = await resp.json();
            const results = data.results || {};

            for(const w of uncached){
              const key = `${lookupDir}|${w.toLowerCase()}`;
              const match = results[w.toLowerCase()];
              if(match){
                lookupCache.set(key, { found: true, id: match.id, headword: match.headword, main_gloss: match.main_gloss });
              } else {
                lookupCache.set(key, { found: false });
              }
            }
          }
        }catch(e){
          console.error("Batch lookup error:", e);
        }
      }

      for(const span of spans){
        if(span.dataset.lookupDir !== lookupDir) continue;
        const word = span.dataset.word;
        if(!word) continue;
        const cacheKey = `${lookupDir}|${word.toLowerCase()}`;
        const cached = lookupCache.get(cacheKey);
        if(!cached) continue;
        if(cached.found){
          span.classList.add("found");
        } else {
          span.classList.add("not-found");
        }
      }
    }
  }

  // Delegate clicks on detail panel
  detail.addEventListener("click", (e)=>{
    if(e.target.closest(".dict-word")){
      hideTooltip();
      handleWordClick(e);
    }
    const toggle = e.target.closest(".senseToggle");
    if(toggle){
      const acc = toggle.closest(".senseAccordion");
      if(acc){
        acc.classList.toggle("open");
        const icon = acc.querySelector(".senseIcon");
        if(icon) icon.textContent = acc.classList.contains("open") ? "âˆ’" : "+";
      }
    }
  });

  function splitIntoSenses(lines){
    const joined = lines.join("\n");
    if(!/\n?\s*\d+[\)\.]\s+/.test(joined)) return [lines];

    const t = joined.replace(/(\s)(\d+[\)\.])\s+/g, "\n$2 ");

    const parts = t.split(/(?=(?:^|\n)\s*\d+[\)\.]\s*)/m)
      .map(s => s.trim())
      .filter(Boolean);

    return parts.map(p => {
      const cleaned = p.replace(/^\s*\d+[\)\.]\s*/,"");
      return normalizeRawLines(cleaned);
    });
  }

  function lineIsLang(line){
    return /^\s*(DE|SR)\s*:\s*/i.test(line || "");
  }

  function splitInlinePair(line){
    const s = (line ?? "").toString().trim();
    if(!s) return null;

    const m = s.match(/^(.*?)(?:\s+[â€”â€“]\s+)(.*)$/);
    if(!m) return null;

    const left = (m[1] || "").trim();
    const right = (m[2] || "").trim();
    if(!left || !right) return null;
    if(left.length <= 3) return null;

    return { de: left, sr: right };
  }

  function langBadgeHtml(lang){
    const L = (lang || "").toLowerCase();
    const flag = (L === "de") ? "ًں‡©ًں‡ھ" : "ًں‡·ًں‡¸";
    const code = (L === "de") ? "DE" : "SR";
    return `<span class="flag" aria-hidden="true">${flag}</span><span class="code">${code}</span>`;
  }

  // -------------------------
  // Speech (ONLY German enabled)
  // -------------------------
  const TTS = {
    voices: [],
    supported: ("speechSynthesis" in window) && ("SpeechSynthesisUtterance" in window),
    currentKey: "",
    speaking: false
  };

  function loadVoices(){
    if(!TTS.supported) return;
    TTS.voices = window.speechSynthesis.getVoices() || [];
  }

  if(TTS.supported){
    loadVoices();
    window.speechSynthesis.onvoiceschanged = () => loadVoices();
  }

  function pickVoice(langTag){
    if(!TTS.supported) return null;
    const want = (langTag || "").toLowerCase();

    let v = TTS.voices.find(x => (x.lang || "").toLowerCase() === want);
    if(v) return v;

    const pref = want.split("-")[0];
    v = TTS.voices.find(x => (x.lang || "").toLowerCase().startsWith(pref));
    if(v) return v;

    return null;
  }

  function normalizeTtsText(s){
    return (s ?? "").toString().replace(/\s+/g, " ").trim();
  }

  function speakText(text, langTag){
    const t = normalizeTtsText(text);
    if(!t) return;
    if(!TTS.supported) return;

    const lang = (langTag || "").toLowerCase();
    if(!(lang.startsWith("de"))) return;

    const key = (langTag || "") + "|" + t;

    if(TTS.speaking && TTS.currentKey === key){
      window.speechSynthesis.cancel();
      TTS.speaking = false;
      TTS.currentKey = "";
      return;
    }

    window.speechSynthesis.cancel();

    const u = new SpeechSynthesisUtterance(t);

    const v = pickVoice(langTag);
    if(v) u.voice = v;

    u.lang = langTag || "de-DE";

    u.onstart = () => { TTS.speaking = true; TTS.currentKey = key; };
    u.onend = () => { TTS.speaking = false; if(TTS.currentKey === key) TTS.currentKey = ""; };
    u.onerror = () => { TTS.speaking = false; if(TTS.currentKey === key) TTS.currentKey = ""; };

    window.speechSynthesis.speak(u);
  }

  // -------------------------
  // plural logic
  // -------------------------
  function parsePluralFieldNew(pluralField){
    const raw = (pluralField ?? "").toString().trim();
    if(!raw) return { raw:"", kind:"none" };
    if(raw === "-" || raw === "â€“" || raw === "â€”") return { raw, kind:"same" };

    const low = raw.toLowerCase();
    if(low === "samosg") return { raw, kind:"no_plural" };

    const mDip = raw.match(/^([أ¤أ„])([uU])\-?(e|er|en|n|s)$/);
    if(mDip){
      const first = mDip[1];
      const second = mDip[2];
      const diph = (first === "أ„" ? "أ„" : "أ¤") + (second === "U" ? "U" : "u");
      return { raw, kind:"umlaut_diphthong", diphthong: diph, suffix: mDip[3].toLowerCase() };
    }

    const mU = raw.match(/^([أ¤أ¶أ¼أ„أ–أœ])\-?(e|er|en|n|s)$/);
    if(mU){
      return { raw, kind:"umlaut_suffix", umlautChar:mU[1], suffix:mU[2].toLowerCase() };
    }

    if(/^(e|er|en|n|s)$/i.test(raw)){
      return { raw, kind:"suffix", suffix: raw.toLowerCase() };
    }

    return { raw, kind:"append", append: raw };
  }

  function applyUmlautToLastComponent(word, umlautChar){
    const hw = (word ?? "").toString();
    if(!hw) return hw;

    const map = { "أ¤":"a", "أ¶":"o", "أ¼":"u", "أ„":"A", "أ–":"O", "أœ":"U" };
    const base = map[umlautChar];
    if(!base) return hw;

    const dashIdx = hw.lastIndexOf("-");
    const prefix = dashIdx >= 0 ? hw.slice(0, dashIdx + 1) : "";
    const last = dashIdx >= 0 ? hw.slice(dashIdx + 1) : hw;

    const idx = last.lastIndexOf(base);
    if(idx < 0) return hw;

    const newLast = last.slice(0, idx) + umlautChar + last.slice(idx + 1);
    return prefix + newLast;
  }

  function applyAeuToLastComponent(word){
    const hw = (word ?? "").toString();
    if(!hw) return hw;

    const dashIdx = hw.lastIndexOf("-");
    const prefix = dashIdx >= 0 ? hw.slice(0, dashIdx + 1) : "";
    const last = dashIdx >= 0 ? hw.slice(dashIdx + 1) : hw;

    const idxLower = last.lastIndexOf("au");
    const idxUpper = last.lastIndexOf("Au");

    let idx = -1;
    let from = "";
    let to = "";

    if(idxLower >= 0 && idxUpper >= 0){
      if(idxLower > idxUpper){ idx = idxLower; from="au"; to="أ¤u"; }
      else { idx = idxUpper; from="Au"; to="أ„u"; }
    }else if(idxLower >= 0){
      idx = idxLower; from="au"; to="أ¤u";
    }else if(idxUpper >= 0){
      idx = idxUpper; from="Au"; to="أ„u";
    }else{
      return hw;
    }

    const newLast = last.slice(0, idx) + to + last.slice(idx + from.length);
    return prefix + newLast;
  }

  function buildPluralFormNew(headword, pluralField){
    const hw = (headword ?? "").toString().trim();
    if(!hw) return "";

    const info = parsePluralFieldNew(pluralField);

    if(info.kind === "none") return "";
    if(info.kind === "no_plural") return "";
    if(info.kind === "same") return hw;

    if(info.kind === "suffix") return hw + info.suffix;
    if(info.kind === "umlaut_suffix") return applyUmlautToLastComponent(hw, info.umlautChar) + info.suffix;
    if(info.kind === "umlaut_diphthong") return applyAeuToLastComponent(hw) + info.suffix;
    if(info.kind === "append") return hw + info.append;

    return "";
  }

  function wrapSuffix(fullWord, suffix){
    const s = (suffix ?? "").toString();
    if(!s) return escapeHtml(fullWord);
    const base = fullWord.slice(0, fullWord.length - s.length);
    return `${escapeHtml(base)}<span class="plHi">${escapeHtml(s)}</span>`;
  }

  function wrapRange(word, start, len){
    const w = (word ?? "").toString();
    if(start == null || len == null || start < 0 || len <= 0) return escapeHtml(w);
    const a = w.slice(0, start);
    const b = w.slice(start, start + len);
    const c = w.slice(start + len);
    return `${escapeHtml(a)}<span class="plHi">${escapeHtml(b)}</span>${escapeHtml(c)}`;
  }

  function applyUmlautToLastComponentMarked(word, umlautChar){
    const hw = (word ?? "").toString();
    if(!hw) return { word: hw, hiStart: -1, hiLen: 0 };

    const map = { "أ¤":"a", "أ¶":"o", "أ¼":"u", "أ„":"A", "أ–":"O", "أœ":"U" };
    const base = map[umlautChar];
    if(!base) return { word: hw, hiStart: -1, hiLen: 0 };

    const dashIdx = hw.lastIndexOf("-");
    const prefix = dashIdx >= 0 ? hw.slice(0, dashIdx + 1) : "";
    const last = dashIdx >= 0 ? hw.slice(dashIdx + 1) : hw;

    const idxBase = last.lastIndexOf(base);
    if(idxBase >= 0){
      const newLast = last.slice(0, idxBase) + umlautChar + last.slice(idxBase + 1);
      const newWord = prefix + newLast;
      const absStart = prefix.length + idxBase;
      return { word: newWord, hiStart: absStart, hiLen: 1 };
    }

    const idxU = last.lastIndexOf(umlautChar);
    if(idxU >= 0){
      const absStart = prefix.length + idxU;
      return { word: hw, hiStart: absStart, hiLen: 1 };
    }

    return { word: hw, hiStart: -1, hiLen: 0 };
  }

  function applyAeuToLastComponentMarked(word){
    const hw = (word ?? "").toString();
    if(!hw) return { word: hw, hiStart: -1, hiLen: 0 };

    const dashIdx = hw.lastIndexOf("-");
    const prefix = dashIdx >= 0 ? hw.slice(0, dashIdx + 1) : "";
    const last = dashIdx >= 0 ? hw.slice(dashIdx + 1) : hw;

    const idxLower = last.lastIndexOf("au");
    const idxUpper = last.lastIndexOf("Au");

    if(idxLower >= 0 || idxUpper >= 0){
      let idx = -1, from = "", to = "";
      if(idxLower >= 0 && idxUpper >= 0){
        if(idxLower > idxUpper){ idx = idxLower; from="au"; to="أ¤u"; }
        else { idx = idxUpper; from="Au"; to="أ„u"; }
      }else if(idxLower >= 0){
        idx = idxLower; from="au"; to="أ¤u";
      }else{
        idx = idxUpper; from="Au"; to="أ„u";
      }

      const newLast = last.slice(0, idx) + to + last.slice(idx + from.length);
      const newWord = prefix + newLast;
      const absStart = prefix.length + idx;
      return { word: newWord, hiStart: absStart, hiLen: 2 };
    }

    const idxAeu = Math.max(last.lastIndexOf("أ¤u"), last.lastIndexOf("أ„u"));
    if(idxAeu >= 0){
      const absStart = prefix.length + idxAeu;
      return { word: hw, hiStart: absStart, hiLen: 2 };
    }

    return { word: hw, hiStart: -1, hiLen: 0 };
  }

  function buildPluralHtml(headword, pluralField){
    const hw = (headword ?? "").toString().trim();
    if(!hw) return "";

    const info = parsePluralFieldNew(pluralField);
    if(info.kind === "none" || info.kind === "no_plural") return "";

    if(info.kind === "same") return escapeHtml(hw);

    if(info.kind === "suffix"){
      const full = hw + info.suffix;
      return wrapSuffix(full, info.suffix);
    }

    if(info.kind === "append"){
      const full = hw + info.append;
      return wrapSuffix(full, info.append);
    }

    if(info.kind === "umlaut_suffix"){
      const r = applyUmlautToLastComponentMarked(hw, info.umlautChar);
      const wordHtml = wrapRange(r.word, r.hiStart, r.hiLen);
      const suffixHtml = `<span class="plHi">${escapeHtml(info.suffix)}</span>`;
      return `${wordHtml}${suffixHtml}`;
    }

    if(info.kind === "umlaut_diphthong"){
      const r = applyAeuToLastComponentMarked(hw);
      const wordHtml = wrapRange(r.word, r.hiStart, r.hiLen);
      const suffixHtml = `<span class="plHi">${escapeHtml(info.suffix)}</span>`;
      return `${wordHtml}${suffixHtml}`;
    }

    const full = buildPluralFormNew(hw, pluralField);
    if(!full) return "";
    return escapeHtml(full);
  }

  // German plural tag: ONLY for DE_SR (German nouns)
    function buildPluralHtmlFromFull(headword, pluralFull){
    const hw = (headword ?? "").toString().trim();
    const pl = (pluralFull ?? "").toString().trim();
    if(!hw || !pl) return "";

    const low = pl.toLowerCase();
    if(low === "samosg") return ""; // no plural

    // "-" means plural equals singular
    if(pl === "-" || pl === "â€“" || pl === "â€”") return `<span class="plBase">${escapeHtml(hw)}</span>`;

    return highlightPluralEdits(hw, pl);
  }

  function highlightPluralEdits(source, target){
    const a = Array.from((source ?? "").toString());
    const b = Array.from((target ?? "").toString());
    const n = a.length, m = b.length;

    // Levenshtein DP
    const dp = Array.from({length: n + 1}, () => new Array(m + 1).fill(0));
    for(let i=0;i<=n;i++) dp[i][0] = i;
    for(let j=0;j<=m;j++) dp[0][j] = j;

    for(let i=1;i<=n;i++){
      for(let j=1;j<=m;j++){
        const cost = (a[i-1] === b[j-1]) ? 0 : 1;
        dp[i][j] = Math.min(
          dp[i-1][j] + 1,        // delete
          dp[i][j-1] + 1,        // insert
          dp[i-1][j-1] + cost    // match/substitute
        );
      }
    }

    // Backtrace: mark insert/substitute positions in TARGET
    const hi = new Array(m).fill(false);
    let i=n, j=m;

    while(i>0 || j>0){
      if(i>0 && j>0){
        const cost = (a[i-1] === b[j-1]) ? 0 : 1;
        if(dp[i][j] === dp[i-1][j-1] + cost){
          if(cost === 1) hi[j-1] = true; // substitute
          i--; j--;
          continue;
        }
      }
      if(j>0 && dp[i][j] === dp[i][j-1] + 1){
        hi[j-1] = true; // insert
        j--;
        continue;
      }
      if(i>0 && dp[i][j] === dp[i-1][j] + 1){
        i--; // delete (no char in target to mark)
        continue;
      }

      // fallback
      if(i>0) i--;
      else if(j>0){ hi[j-1] = true; j--; }
    }

    // Build HTML (group consecutive highlights)
    // Unchanged chars (same as headword) â†’ red (die-color), changed/added chars â†’ plHi (purple)
    let out = "";
    let curClass = null; // null = no open span
    for(let k=0;k<m;k++){
      const mark = !!hi[k];
      const cls = mark ? "plHi" : "plBase";
      if(cls !== curClass){
        if(curClass !== null) out += `</span>`;
        out += `<span class="${cls}">`;
        curClass = cls;
      }
      out += escapeHtml(b[k]);
    }
    if(curClass !== null) out += `</span>`;
    return out;
  }

  function renderSense(lines, quick, openByDefault){
    if(!lines || !lines.length) return "";

    const nonEmpty = lines.map(x=>x.trim()).filter(Boolean);
    if(nonEmpty.length === 1 && normalizeCmp(nonEmpty[0]) === normalizeCmp(quick)) return "";

    let idx = 0;
    let heading = "";
    if(nonEmpty.length >= 2 && !lineIsLang(nonEmpty[0]) && lineIsLang(nonEmpty[1])){
      if(normalizeCmp(nonEmpty[0]) !== normalizeCmp(quick)){
        heading = nonEmpty[0];
      }
      idx = 1;
    } else if(nonEmpty.length >= 1 && !lineIsLang(nonEmpty[0])){
      heading = nonEmpty[0];
      idx = 1;
    }

    const blocks = [];

    for(let i=idx;i<nonEmpty.length;i++){
      const line = nonEmpty[i];

      const m = line.match(/^\s*(DE|SR)\s*:\s*(.*)$/i);
      if (m) {
        const lang = m[1].toLowerCase();
        const txt = (m[2] || "").trim();

        if (lang === "de") {
          const md = txt.match(/^(.*?)(?:\s*[â€”â€“]\s*SR\s*:\s*)(.+)$/i);
          if (md) {
            const left = (md[1] || "").trim();
            const right = (md[2] || "").trim();
            if (left) blocks.push({ type: "pair", lang: "de", txt: left });
            if (right) blocks.push({ type: "pair", lang: "sr", txt: right });
            continue;
          }

          const ms = txt.match(/^(.*?)(?:\s*\/\s*SR\s*:\s*)(.+)$/i);
          if (ms) {
            const left = (ms[1] || "").trim();
            const right = (ms[2] || "").trim();
            if (left) blocks.push({ type: "pair", lang: "de", txt: left });
            if (right) blocks.push({ type: "pair", lang: "sr", txt: right });
            continue;
          }
        }

        blocks.push({ type:"pair", lang, txt });
        continue;
      }

      const p = splitInlinePair(line);
      if(p){
        blocks.push({ type:"pair", lang:"de", txt: p.de });
        blocks.push({ type:"pair", lang:"sr", txt: p.sr });
        continue;
      }

      blocks.push({ type:"plain", txt: line });
    }

    const speakSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;flex-shrink:0;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;

    const inner = blocks.map(b=>{
      if(b.type==="pair"){
        const langTag = b.lang;
        const speak = (langTag === "de")
          ? `<button class="speakBtn speakBtnGreen" type="button" title="Aussprache" aria-label="Beispiel sprechen"
              data-lang="${escapeHtml(deLang())}" data-say="${escapeHtml(b.txt)}">${speakSvg}</button>`
          : "";

        return `<div class="pair">
          <div class="pairMain">
            <span class="langTag ${langTag}">${langBadgeHtml(langTag)}</span>
            <span class="langTxt">${wrapWordsClickable(b.txt, langTag)}</span>
          </div>
          ${speak}
        </div>`;
      }
      return `<div class="plain">${escapeHtml(b.txt).replace(/\n/g,"<br>")}</div>`;
    }).join("");

    const hasPairs = blocks.some(b => b.type === "pair");
    if(!hasPairs){
      return `<div class="sense">${heading ? `<div class="head">${escapeHtml(heading)}</div>` : ""}${inner}</div>`;
    }

    const openClass = openByDefault ? " open" : "";
    const labelHtml = heading ? escapeHtml(heading) : "â€”";
    const icon = openByDefault ? "\u2212" : "+";

    return `<div class="senseAccordion${openClass}">
      <button class="senseToggle" type="button">
        <i class="senseIcon">${icon}</i>
        <span class="senseLabel">${labelHtml}</span>
      </button>
      <div class="senseBody">${inner}</div>
    </div>`;
  }

  // Remove the duplicated "header" line from raw_clean (often starts with headword),
  // since headword is already rendered as the main title on the right panel.
  function stripRawCleanHeaderLine(rawCleanText, item) {
    if (!rawCleanText) return rawCleanText;

    const lines = String(rawCleanText).split(/\r?\n/);

    // find first non-empty line
    let i = 0;
    while (i < lines.length && lines[i].trim() === "") i++;

    if (i >= lines.length) return rawCleanText;

    const first = lines[i].trim();
    const hw = (item && item.headword ? String(item.headword) : "").trim();

    if (!hw) return rawCleanText;

    const hwLower = hw.toLowerCase();
    const firstLower = first.toLowerCase();

    const startsWithHeadword =
      firstLower === hwLower ||
      firstLower.startsWith(hwLower + " ") ||
      firstLower.startsWith(hwLower + "(") ||
      firstLower.startsWith(hwLower + " -") ||
      firstLower.startsWith(hwLower + " â€“") ||
      firstLower.startsWith(hwLower + ":");

    if (!startsWithHeadword) return rawCleanText;

    // drop that header line and one optional blank line that follows
    lines.splice(i, 1);
    if (i < lines.length && lines[i].trim() === "") lines.splice(i, 1);

    return lines.join("\n");
  }

  // Image UX:
  // - Show placeholder until the image is confirmed loaded
  // - If image fails, remove <img> so the broken-image icon never appears
  function wireDetailImage(detailEl){
    const wrap = detailEl.querySelector(".imgWrap");
    if(!wrap) return;

    const img = wrap.querySelector("img.entryImg");
    const ph  = wrap.querySelector(".imgPlaceholder");

    if(!img){
      // no image element => keep placeholder visible
      if(ph) ph.style.display = "flex";
      wrap.classList.remove("loaded");
      return;
    }

    // Hide the <img> until it successfully loads, so broken-image icons never flash.
    img.style.visibility = "hidden";
    img.style.opacity = "0";
    img.style.transition = "opacity 140ms ease";

    const showPh = () => { if(ph) ph.style.display = "flex"; };
    const hidePh = () => { if(ph) ph.style.display = "none"; };

    const markLoaded = () => {
      wrap.classList.add("loaded");
      hidePh();
      img.style.visibility = "visible";
      img.style.opacity = "1";
    };

    const markError = () => {
      wrap.classList.remove("loaded");
      // Prevent the browser from showing a broken-image icon
      try { img.removeAttribute("src"); } catch(e) {}
      img.style.visibility = "hidden";
      img.style.opacity = "0";
      showPh();
    };

    img.addEventListener("load", markLoaded, { once: true });
    img.addEventListener("error", markError, { once: true });

    // Cached images / immediate failures: events may not fire
    if(img.complete){
      if(img.naturalWidth > 0) markLoaded();
      else markError();
    }
  }

        <div class="word">â€”</div>
        <div class="meta">Kucaj za pretragu (${dir==="SR_DE" ? "SRâ†’DE" : "DEâ†’SR"})</div>
        <div class="wordUnderline"></div>
        <div class="quick">â€”</div>
        <div class="explain"><div class="plain">Upiإ،i reؤچ da poؤچneإ، pretragu</div></div>`;

      wireDetailImage(detail);

      selectedId = null;
      syncUrl();
      return;
    }

    const hasRawClean = !!((item?.raw_clean ?? "").toString().trim());
    const quick = hasRawClean ? "" : getQuickGloss(item);

    let explanation = getExplanationText(item) || "â€”";
    if(hasRawClean){
      explanation = stripRawCleanHeaderLine(explanation, item);
    }

    let lines = normalizeRawLines(explanation);
    lines = dropLeadingQuickDuplicate(lines, quick);
    explanation = lines.join("\n");

    const pluralHtml = renderPluralTag(item) || `<span class="plTag plEmpty">Pl: â€”</span>`;
    const hwCls = headwordGenderClass(item);

    const hw = (item?.headword ?? "").toString().trim();
    const pos = (item?.pos ?? "").toString().trim().toLowerCase();
    const gender = (item?.gender ?? "").toString().trim().toLowerCase();
    const art = (gender === "der" || gender === "die" || gender === "das") ? gender : "";
    const headwordSay = (pos === "noun" && art) ? `${art} ${hw}` : hw;

    const headwordSpeak = (dir === "DE_SR")
      ? `<button class="speakBtn speakBtnWord" type="button" title="Aussprache" aria-label="Wort sprechen"
          data-lang="${escapeHtml(deLang())}" data-say="${escapeHtml(headwordSay)}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;flex-shrink:0;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>`
      : "";

    detail.innerHTML = `
      ${renderImageHtml(item)}
      <div class="wordRow">
        <div class="wordLine">
          <div class="word ${hwCls}">${escapeHtml(item.headword)}</div>
          ${headwordSpeak}
        </div>
        ${pluralHtml}
      </div>
      <div class="meta">${renderMetaHtml(item)}</div>
      <div class="wordUnderline"></div>
      ${hasRawClean ? "" : `<div class="quick">${escapeHtml(quick || "â€”")}</div>`}
      ${renderExplanationRich(explanation, item, quick)}
    `;

    wireDetailImage(detail);

    selectedId = item.id;
    syncUrl();

    requestAnimationFrame(fitHeadword);

    // Prefetch which words in examples are clickable
    prefetchClickableWords();
  }

  function renderList(){
    list.innerHTML = "";
    
    const term = q.value.trim();
    
    // If input is empty and we have history, show history instead of results
    const hist = loadHistory();
    if(!term && hist.length > 0){
      emptyState.style.display = "none";
      list.style.display = "none";
      renderHistory();
      renderDetail(results[active]);
      return;
    }
    
    // Hide history when typing
    historyBox.classList.remove("show");
    
    // Show empty state if no results and user has typed something
    if(results.length === 0 && term){
      emptyState.innerHTML = `Nema rezultata za <strong>"${escapeHtml(term)}"</strong><br><span style="font-size:13px;color:#aaa">Pokuإ،aj sa drugim terminom</span>`;
      emptyState.style.display = "block";
      list.style.display = "none";
    } else {
      emptyState.style.display = "none";
      list.style.display = "block";
      
      results.forEach((item, idx) => {
        const li = document.createElement("li");
        li.className = "suggestItem";
        li.dataset.active = (idx===active) ? "true" : "false";
        li.setAttribute("aria-selected", (idx===active) ? "true" : "false");
        li.innerHTML = `
          <div class="hw">${highlightHtml(item.headword, q.value)}</div>
          <div class="tr">${escapeHtml(normalizeGloss(item.main_gloss || ""))}</div>
        `;
        li.addEventListener("click", ()=>{ active=idx; addToHistory(item.headword, dir); renderList(); renderDetail(results[active]);
          // On mobile, scroll to the detail panel so the user can see the entry
          if(window.innerWidth <= 920){
            setTimeout(()=>{ detail.scrollIntoView({ behavior:"smooth", block:"start" }); }, 80);
          }
        });
        list.appendChild(li);
      });
    }
    
    const activeEl = list.querySelector('.suggestItem[data-active="true"]');
    if(activeEl){ activeEl.scrollIntoView({ block: "nearest" }); }
    renderDetail(results[active]);
  }

  async function fetchJson(url){
    const r = await fetch(url, { headers: { "Accept": "application/json" }});
    if(!r.ok){
      const t = await r.text().catch(()=> "");
      throw new Error(`HTTP ${r.status} ${r.statusText}${t ? " â€” " + t : ""}`);
    }
    return r.json();
  }

  async function search(){
    const term = q.value.trim();
    errBox.style.display = "none";

    // If input is empty and we have history, skip API call and show history immediately
    const hist = loadHistory();
    if(!term && hist.length > 0){
      results = [];
      active = 0;
      loading.style.display = "none";
      renderList();
      return;
    }

    loading.style.display = "block";

    try{
      // reset pagination on a new search
      offset = 0;

      const params = new URLSearchParams({
        direction: dir,
        q: term,
        limit: String(PAGE_SIZE),
        offset: String(offset)
      });
      const data = await fetchJson(`/api/dict/search?${params.toString()}`);

      results = Array.isArray(data) ? data : (data?.rows || []);
      hasMore = Array.isArray(results) && results.length === PAGE_SIZE;

      // If URL contains an entry id, try to keep that entry selected (refresh / shared link)
      const desiredId = (__pendingSelectId != null && String(__pendingSelectId).trim() !== "")
        ? String(__pendingSelectId).trim()
        : null;

      if (desiredId && results.length) {
        const idx = results.findIndex(r => String(r.id) === desiredId);
        if (idx >= 0) active = idx;
        // Clear pending id after first successful attempt so normal typing behaves as usual
        __pendingSelectId = null;
      } else {
        active = 0;
      }

      renderList();
    }catch(e){
      results = [];
      active = 0;
      list.innerHTML = "";
      renderDetail(null);
      errBox.textContent = String(e.message || e);
      errBox.style.display = "block";
    }finally{
      loading.style.display = "none";
    }
  }

  q.addEventListener("input", ()=>{
    clearTimeout(window.__t);
    window.__t = setTimeout(search, 120);
  });

  q.addEventListener("keydown", (e)=>{
    if(e.key==="ArrowDown"){ e.preventDefault(); if(results.length){ active=Math.min(active+1, results.length-1); renderList(); } }
    else if(e.key==="ArrowUp"){ e.preventDefault(); if(results.length){ active=Math.max(active-1, 0); renderList(); } }
    else if(e.key==="Enter"){ e.preventDefault(); if(results[active]){ addToHistory(results[active].headword, dir); } renderDetail(results[active]); }
    else if(e.key==="Escape"){ e.preventDefault(); q.value=""; q.focus(); search(); }
  });



// Global keyboard navigation: allow ArrowUp/ArrowDown/Enter even if focus moved elsewhere,
// as long as the user isn't typing in another input/textarea/contenteditable.
document.addEventListener("keydown", (e) => {
  // Global Escape: always clear search and focus input
  if (e.key === "Escape") {
    e.preventDefault();
    q.value = "";
    q.focus();
    search();
    return;
  }

  // Global navigation (optional): use Ctrl + ArrowUp/ArrowDown/Ctrl+Enter from anywhere
  // so normal Arrow keys can scroll/read the right panel without being hijacked.
  const navKeys = ["ArrowUp","ArrowDown","Enter"];
  if (!navKeys.includes(e.key)) return;
  if (!e.ctrlKey) return;

  const ae = document.activeElement;
  // Don't steal keys when user is typing in an input/textarea/contenteditable.
  const tag = (ae && ae.tagName) ? ae.tagName.toLowerCase() : "";
  const isTypingField = (tag === "input" || tag === "textarea" || (ae && ae.isContentEditable));
  if (isTypingField) return;

  if (!results.length) return;

  e.preventDefault();

  if (e.key === "ArrowDown") {
    active = Math.min(active + 1, results.length - 1);
    renderList();
  } else if (e.key === "ArrowUp") {
    active = Math.max(active - 1, 0);
    renderList();
  } else if (e.key === "Enter") {
    renderDetail(results[active]);
  }
});


  window.addEventListener("resize", ()=> requestAnimationFrame(fitHeadword));

  async function initFromUrl(){
    // apply URL params once on initial load
    updateCharBar();
    if (__initQ) q.value = __initQ;

    if (__initDir === "DE_SR" || __initDir === "SR_DE") {
      dir = __initDir;
      btnSRDE.dataset.active = (dir==="SR_DE") ? "true" : "false";
      btnDESR.dataset.active = (dir==="DE_SR") ? "true" : "false";
      btnSRDE.setAttribute("aria-pressed", dir==="SR_DE" ? "true" : "false");
      btnDESR.setAttribute("aria-pressed", dir==="DE_SR" ? "true" : "false");
    }

    updateCharBar();
    updatePlaceholder();

    // reflect initial state in URL (normalizes casing, etc.)
    syncUrl();

    __isInit = false;
    renderDetail(null);
    q.focus();
    await search();
  }

  // Handle browser Back/Forward buttons
  window.addEventListener("popstate", async () => {
    const params = new URLSearchParams(window.location.search);
    const newDir = (params.get("dir") || "").toUpperCase();
    const newQ = params.get("q") || "";
    __pendingSelectId = params.get("id");

    if(newDir === "DE_SR" || newDir === "SR_DE"){
      dir = newDir;
      btnSRDE.dataset.active = (dir==="SR_DE") ? "true" : "false";
      btnDESR.dataset.active = (dir==="DE_SR") ? "true" : "false";
      btnSRDE.setAttribute("aria-pressed", dir==="SR_DE" ? "true" : "false");
      btnDESR.setAttribute("aria-pressed", dir==="DE_SR" ? "true" : "false");
      updateCharBar();
      updatePlaceholder();
    }

    q.value = newQ;
    await search();
  });

  // -------------------------
  // Dark mode toggle
  // -------------------------
  const THEME_KEY = "dict_theme";
  const themeToggle = document.getElementById("themeToggle");

  function applyTheme(theme){
    document.documentElement.setAttribute("data-theme", theme);
    themeToggle.textContent = theme === "dark" ? "âک€ï¸ڈ" : "ًںŒ™";
    try{ localStorage.setItem(THEME_KEY, theme); }catch(e){}
  }

  function initTheme(){
    let saved = null;
    try{ saved = localStorage.getItem(THEME_KEY); }catch(e){}
    if(saved === "dark" || saved === "light"){
      applyTheme(saved);
    } else if(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches){
      applyTheme("dark");
    } else {
      applyTheme("light");
    }
  }

  themeToggle.addEventListener("click", ()=>{
    const current = document.documentElement.getAttribute("data-theme");
    applyTheme(current === "dark" ? "light" : "dark");
  });

  initTheme();

  initFromUrl();
</script>
